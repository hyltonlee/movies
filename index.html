    <script>
        const API_KEY = '3da63f2030991fb208636501d053bf0d';
        const BASE_URL = 'https://api.themoviedb.org/3';
        const IMAGE_URL = 'https://image.tmdb.org/t/p/w342';

        let activeType = 'movie'; 
        let activeId = '';
        let activeTitle = '';
        let activeSeason = 1;
        let activeEpisode = 1;
        let trendingPage = 1;
        let trendingTotalPages = 1;
        let currentSearchQuery = ''; // Track if we're in search mode

        // Safe localStorage wrapper
        function safeLocalStorage() {
            try {
                const test = '__storage_test__';
                localStorage.setItem(test, test);
                localStorage.removeItem(test);
                return true;
            } catch (e) {
                console.warn('localStorage not available:', e.message);
                return false;
            }
        }

        const storageAvailable = safeLocalStorage();

        function getItem(key, defaultValue = null) {
            if (!storageAvailable) return defaultValue;
            try {
                const value = localStorage.getItem(key);
                return value !== null ? value : defaultValue;
            } catch (e) {
                console.warn('Failed to read from localStorage:', e.message);
                return defaultValue;
            }
        }

        function setItem(key, value) {
            if (!storageAvailable) return false;
            try {
                localStorage.setItem(key, value);
                return true;
            } catch (e) {
                console.warn('Failed to write to localStorage:', e.message);
                return false;
            }
        }

        function removeItem(key) {
            if (!storageAvailable) return false;
            try {
                localStorage.removeItem(key);
                return true;
            } catch (e) {
                console.warn('Failed to remove from localStorage:', e.message);
                return false;
            }
        }

        function getEmbedUrl(provider, type, id, s = 1, e = 1) {
            switch(provider) {
                case 'vidkingnet':
                    return type === 'movie' ? `https://vidking.net/embed/movie/${id}` : `https://vidking.net/embed/tv/${id}/${s}/${e}`;
                case 'vidlink':
                    return type === 'movie' ? `https://vidlink.pro/movie/${id}` : `https://vidlink.pro/tv/${id}/${s}/${e}`;
                case 'vidsrcto':
                    return type === 'movie' ? `https://vidsrc.to/embed/movie/${id}` : `https://vidsrc.to/embed/tv/${id}/${s}/${e}`;
                case 'vidsrccc':
                    return type === 'movie' ? `https://vidsrc.cc/v2/embed/movie/${id}` : `https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}`;
                case 'vidsrcme':
                    return type === 'movie' ? `https://vidsrc.me/embed/movie?tmdb=${id}` : `https://vidsrc.me/embed/tv?tmdb=${id}&sea=${s}&epi=${e}`;
                case 'autoembed':
                    return type === 'movie' ? `https://player.autoembed.to/movie/${id}` : `https://player.autoembed.to/tv/${id}/${s}/${e}`;
                case 'twoembed':
                    return type === 'movie' ? `https://www.2embed.cc/embed/${id}` : `https://www.2embed.cc/embedtv/${id}&s=${s}&e=${e}`;
                case 'embedsu':
                    return type === 'movie' ? `https://embed.su/embed/movie/${id}` : `https://embed.su/embed/tv/${id}/${s}/${e}`;
                case 'vidsrcpro':
                    return type === 'movie' ? `https://vidsrc.pro/embed/movie/${id}` : `https://vidsrc.pro/embed/tv/${id}/${s}/${e}`;
                case 'rivestream':
                    return type === 'movie' ? `https://api.rivestream.xyz/embed/movie?tmdb=${id}` : `https://api.rivestream.xyz/embed/tv?tmdb=${id}&season=${s}&episode=${e}`;
                case 'smashy':
                    return type === 'movie' ? `https://embed.smashystream.com/playere.php?tmdb=${id}` : `https://embed.smashystream.com/playere.php?tmdb=${id}&season=${s}&episode=${e}`;
                case 'moviesapi':
                    return type === 'movie' ? `https://moviesapi.club/movie/${id}` : `https://moviesapi.club/tv/${id}-${s}-${e}`;
                case 'superembed':
                    return type === 'movie' ? `https://multiembed.mov/?video_id=${id}&tmdb=1` : `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`;
                case 'novera':    return `https://player.novera.website/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;
                case 'cinepro':   return `https://cinepro.org/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;
                case 'movieweb':  return `https://backend.movie-web.app/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;
                case 'fsapi':     return `https://vidsrc.xyz/embed/movie/${id}`; 
                case 'gomo':      return `https://gomoplayer.com/movie/${id}`;
                case 'curtstream':return `https://curtstream.xyz/embed/${type}/${id}`;
                case 'moviewp':   return `https://moviewp.xyz/embed/${type}/${id}`;
                case 'apimdb':    return `https://api.imdbapi.xyz/embed/${type}/${id}`;
                case 'vidcloud':  return `https://vidcloud.stream/embed/${type}/${id}`;
                case 'streamnova':return `https://streamnova.xyz/embed/${type}/${id}`;
                case 'cinematrixx':return `https://cinematrixx.lol/embed/${type}/${id}`;
                case 'reelverse': return `https://reelverse.biz/embed/${type}/${id}`;
                case 'flixora':   return `https://flixora.com/embed/${type}/${id}`;
                case 'novaprime': return `https://novaprime.films/embed/${type}/${id}`;
                case 'cinehorizon':return `https://cinehorizon.net/embed/${type}/${id}`;
                case 'velostreams':return `https://velostreams.com/embed/${type}/${id}`;
                case 'filmorahub': return `https://filmorahub.xyz/embed/${type}/${id}`;
                case 'epicscreen': return `https://epicscreen.live/embed/${type}/${id}`;
                case 'cineluxe':   return `https://cineluxe.club/embed/${type}/${id}`;
                default:
                    return `https://vidking.net/embed/${type}/${id}${type==='tv'?`/${s}/${e}`:''}`;
            }
        }

        function setPageIndicator() {
            const pageIndicator = document.getElementById('page-indicator');
            const prevBtn = document.getElementById('prev-page-btn');
            const nextBtn = document.getElementById('next-page-btn');

            if (pageIndicator) pageIndicator.innerText = `Page ${trendingPage} of ${trendingTotalPages}`;
            if (prevBtn) {
                prevBtn.disabled = trendingPage <= 1;
                prevBtn.classList.toggle('opacity-50', trendingPage <= 1);
                prevBtn.classList.toggle('cursor-not-allowed', trendingPage <= 1);
            }
            if (nextBtn) {
                nextBtn.disabled = trendingPage >= trendingTotalPages;
                nextBtn.classList.toggle('opacity-50', trendingPage >= trendingTotalPages);
                nextBtn.classList.toggle('cursor-not-allowed', trendingPage >= trendingTotalPages);
            }
        }

        async function changeTrendingPage(delta) {
            // Don't change page if we're in search mode
            if (currentSearchQuery) return;
            
            const newPage = trendingPage + delta;
            if (newPage < 1 || newPage > trendingTotalPages) return;
            trendingPage = newPage;
            await fetchTrending(activeType, false);
            setPageIndicator();
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializePreferences();
            fetchTrending('movie', true);
            syncDashboardUI();
            
            const handleSearch = async (e) => {
                const query = e.target.value.trim();
                currentSearchQuery = query;
                
                if (query.length > 2) {
                    try {
                        const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
                        const data = await res.json();
                        const filtered = data.results.filter(i => i.media_type === 'movie' || i.media_type === 'tv');
                        document.getElementById('section-title').innerText = `Search results for: "${query}"`;
                        renderGrid(filtered, null);
                        // Hide pagination when searching
                        document.getElementById('prev-page-btn').style.display = 'none';
                        document.getElementById('next-page-btn').style.display = 'none';
                        document.getElementById('page-indicator').style.display = 'none';
                    } catch (err) {
                        console.error('Search failed:', err);
                        document.getElementById('media-grid').innerHTML = '<div class="col-span-full text-center text-zinc-500 py-12 text-sm">Search failed. Please try again.</div>';
                    }
                } else if (query.length === 0) {
                    // Show pagination again
                    document.getElementById('prev-page-btn').style.display = 'flex';
                    document.getElementById('next-page-btn').style.display = 'flex';
                    document.getElementById('page-indicator').style.display = 'flex';
                    trendingPage = 1;
                    await fetchTrending(activeType, true);
                    setPageIndicator();
                }
            };

            const heroSearch = document.getElementById('hero-search-input');
            const navSearch = document.getElementById('nav-search-input');
            if (heroSearch) heroSearch.addEventListener('input', handleSearch);
            if (navSearch) navSearch.addEventListener('input', handleSearch);
        });

        function initializePreferences() {
            const savedProvider = getItem('hylton_preferred_provider', 'vidkingnet');
            
            const mainSelect = document.getElementById('provider-select');
            if (mainSelect) mainSelect.value = savedProvider;

            const modalSelect = document.getElementById('settings-default-provider');
            if (modalSelect && mainSelect) {
                modalSelect.innerHTML = mainSelect.innerHTML;
                modalSelect.value = savedProvider;
            }
        }

        function toggleSettingsModal() {
            const modal = document.getElementById('settings-modal');
            if (!modal) return;
            if (modal.classList.contains('hidden')) {
                const currentProvider = getItem('hylton_preferred_provider', 'vidkingnet');
                const modalSelect = document.getElementById('settings-default-provider');
                if (modalSelect) modalSelect.value = currentProvider;
                modal.classList.remove('hidden');
                modal.classList.add('flex');
            } else {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
            }
        }

        function saveClientSettings() {
            const selected = document.getElementById('settings-default-provider')?.value;
            if (selected) {
                setItem('hylton_preferred_provider', selected);
                const mainSelect = document.getElementById('provider-select');
                if (mainSelect) mainSelect.value = selected;
                
                if (!document.getElementById('player-view')?.classList.contains('hidden')) {
                    updatePlayerUrl();
                }
            }
            toggleSettingsModal();
        }

        function onProviderChange() {
            const selected = document.getElementById('provider-select')?.value;
            if (selected) {
                setItem('hylton_preferred_provider', selected);
                updatePlayerUrl();
            }
        }

        async function fetchTrending(type, resetPage = false) {
            activeType = type;

            const movieBtn = document.getElementById('toggle-movie');
            const tvBtn = document.getElementById('toggle-tv');
            const sectionTitle = document.getElementById('section-title');
            
            if (type === 'movie') {
                if (movieBtn) movieBtn.className = "px-3 py-1 rounded bg-zinc-800 text-zinc-100 font-medium";
                if (tvBtn) tvBtn.className = "px-3 py-1 rounded text-zinc-400 hover:text-zinc-100";
                if (sectionTitle) sectionTitle.innerText = "Trending Movies";
            } else {
                if (tvBtn) tvBtn.className = "px-3 py-1 rounded bg-zinc-800 text-zinc-100 font-medium";
                if (movieBtn) movieBtn.className = "px-3 py-1 rounded text-zinc-400 hover:text-zinc-100";
                if (sectionTitle) sectionTitle.innerText = "Trending TV Series";
            }

            // Reset to page 1 only when switching categories or explicitly requested
            if (resetPage) {
                trendingPage = 1;
            }

            try {
                const res = await fetch(`${BASE_URL}/trending/${type}/week?api_key=${API_KEY}&page=${trendingPage}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                trendingTotalPages = Math.min(data.total_pages || 1, 500); // TMDB limits to 500 pages
                setPageIndicator();
                renderGrid(data.results, type);
            } catch (err) {
                console.error('Fetch trending failed:', err);
                const grid = document.getElementById('media-grid');
                if (grid) {
                    grid.innerHTML = '<div class="col-span-full text-center text-zinc-500 py-12 text-sm">Failed to load content. Please check your internet connection.</div>';
                }
            }
        }

        function renderGrid(items, forceType) {
            const grid = document.getElementById('media-grid');
            if (!grid) return;
            grid.innerHTML = '';

            if (!items || items.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-zinc-500 py-12 text-sm">No results found.</div>`;
                return;
            }

            items.forEach(item => {
                const type = forceType || item.media_type;
                const title = item.title || item.name;
                const year = (item.release_date || item.first_air_date || '').split('-')[0] || 'N/A';
                const poster = item.poster_path
                    ? `${IMAGE_URL}${item.poster_path}`
                    : 'https://images.unsplash.com/photo-1440404653325-ab127d49abc1?q=80&w=342&auto=format&fit=crop';

                const card = document.createElement('div');
                card.className = "group cursor-pointer space-y-2 relative";
                card.onclick = () => launchPlayer(type, item.id, title);

                card.innerHTML = `
                    <div class="aspect-[2/3] w-full overflow-hidden rounded-md bg-zinc-900 border border-zinc-800 transition-colors group-hover:border-zinc-700 relative">
                        <img src="${poster}" alt="${title}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105" loading="lazy">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center">
                            <div class="bg-zinc-950/80 p-3 rounded-full border border-zinc-700 text-zinc-100 transform scale-90 group-hover:scale-100 transition-transform">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="space-y-0.5 px-1">
                        <h3 class="text-xs font-medium text-zinc-200 line-clamp-1 group-hover:text-white transition-colors tracking-tight">${escapeHtml(title)}</h3>
                        <div class="flex items-center justify-between text-[10px] text-zinc-500 font-mono">
                            <span>${year}</span>
                            <span class="uppercase border border-zinc-800 px-1 rounded bg-zinc-900">${type}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function launchPlayer(type, id, title = '') {
            activeType = type;
            activeId = id;
            activeTitle = title || `Asset Vector ${id}`;
            activeSeason = 1;
            activeEpisode = 1;
            
            const homeView = document.getElementById('home-view');
            const playerView = document.getElementById('player-view');
            const navSearch = document.getElementById('nav-search-container');
            
            if (homeView) homeView.classList.add('hidden');
            if (playerView) playerView.classList.remove('hidden');
            if (navSearch) navSearch.classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });

            if (type === 'tv') {
                const tvControls = document.getElementById('tv-controls');
                if (tvControls) tvControls.classList.remove('hidden');
                try {
                    const res = await fetch(`${BASE_URL}/tv/${id}?api_key=${API_KEY}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    activeTitle = data.name;
                    
                    retrieveSavedProgressMarker();

                    const selector = document.getElementById('season-select');
                    if (selector) {
                        selector.innerHTML = '';
                        for (let i = 1; i <= data.number_of_seasons; i++) {
                            const opt = document.createElement('option');
                            opt.value = i;
                            opt.innerText = `Season ${i}`;
                            if(i === activeSeason) opt.selected = true;
                            selector.appendChild(opt);
                        }
                    }
                    await buildEpisodeGrid(id, activeSeason);
                } catch(err) {
                    console.error('Failed to load TV show details:', err);
                }
            } else {
                const tvControls = document.getElementById('tv-controls');
                if (tvControls) tvControls.classList.add('hidden');
                updatePlayerUrl();
                recordWatchHistory();
            }
        }

        async function buildEpisodeGrid(id, seasonNum) {
            try {
                const res = await fetch(`${BASE_URL}/tv/${id}/season/${seasonNum}?api_key=${API_KEY}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                const grid = document.getElementById('episode-grid');
                if (!grid) return;
                grid.innerHTML = '';

                data.episodes.forEach(ep => {
                    const btn = document.createElement('button');
                    btn.innerText = ep.episode_number;
                    btn.className = `h-8 text-xs font-mono rounded border transition-all ${
                        ep.episode_number === activeEpisode 
                        ? 'bg-zinc-100 border-zinc-100 text-zinc-950 font-bold' 
                        : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:border-zinc-600 hover:text-zinc-100'
                    }`;
                    btn.onclick = () => {
                        activeSeason = seasonNum;
                        activeEpisode = ep.episode_number;
                        buildEpisodeGrid(activeId, activeSeason);
                        updatePlayerUrl();
                        recordWatchHistory();
                    };
                    grid.appendChild(btn);
                });

                updatePlayerUrl();
            } catch(err) {
                console.error('Failed to load episodes:', err);
            }
        }

        function onSeasonChange() {
            const seasonSelect = document.getElementById('season-select');
            if (seasonSelect) {
                activeSeason = parseInt(seasonSelect.value);
                activeEpisode = 1; 
                buildEpisodeGrid(activeId, activeSeason);
            }
        }

        function updatePlayerUrl() {
            const provider = document.getElementById('provider-select')?.value || 'vidkingnet';
            const target = getEmbedUrl(provider, activeType, activeId, activeSeason, activeEpisode);
            const iframe = document.getElementById('video-iframe');
            if (iframe && iframe.src !== target) {
                iframe.src = target;
            }
        }

        function showHome(e) {
            if (e) e.preventDefault();
            const iframe = document.getElementById('video-iframe');
            if (iframe) iframe.src = ""; 
            const playerView = document.getElementById('player-view');
            const navSearch = document.getElementById('nav-search-container');
            const homeView = document.getElementById('home-view');
            
            if (playerView) playerView.classList.add('hidden');
            if (navSearch) navSearch.classList.add('hidden');
            if (homeView) homeView.classList.remove('hidden');
            
            const heroSearch = document.getElementById('hero-search-input');
            const navSearchInput = document.getElementById('nav-search-input');
            if (heroSearch) heroSearch.value = "";
            if (navSearchInput) navSearchInput.value = "";
            
            // Reset search query and show pagination
            currentSearchQuery = '';
            document.getElementById('prev-page-btn').style.display = 'flex';
            document.getElementById('next-page-btn').style.display = 'flex';
            document.getElementById('page-indicator').style.display = 'flex';
            
            syncDashboardUI();
            trendingPage = 1;
            fetchTrending(activeType, true);
            setPageIndicator();
        }

        function syncDashboardUI() {
            const panel = document.getElementById('tracker-dashboard-panel');
            const historyContainer = document.getElementById('panel-history-container');
            
            if (!storageAvailable || !panel || !historyContainer) return;
            
            let localHistory = [];
            try {
                const raw = localStorage.getItem('hylton_local_history');
                localHistory = raw ? JSON.parse(raw) : [];
            } catch (e) {
                console.warn('Failed to parse history:', e);
                localHistory = [];
            }

            if(localHistory.length > 0) {
                panel.classList.remove('hidden');
                historyContainer.innerHTML = '';
                
                [...localHistory].reverse().slice(0, 10).forEach(record => {
                    const cell = document.createElement('div');
                    cell.className = "flex items-center justify-between text-xs bg-zinc-900/60 hover:bg-zinc-900 border border-zinc-800 rounded px-3 py-2 transition-colors cursor-pointer group";
                    
                    let runtimeLabel = `<span class="text-[10px] uppercase font-mono tracking-wider border border-zinc-800 bg-zinc-950 px-1.5 rounded py-0.5 text-zinc-400 group-hover:text-zinc-200">Movie</span>`;
                    if(record.type === 'tv') {
                        runtimeLabel = `<span class="text-[10px] uppercase font-mono tracking-wider border border-zinc-700 bg-zinc-900 px-1.5 rounded py-0.5 text-zinc-100 font-bold">S${record.season} E${record.episode}</span>`;
                    }

                    cell.innerHTML = `
                        <div class="flex flex-col max-w-[70%]">
                            <span class="font-medium text-zinc-300 group-hover:text-white line-clamp-1 truncate">${escapeHtml(record.title || 'Unknown')}</span>
                            <span class="text-[9px] font-mono text-zinc-600 mt-0.5">${record.timestamp ? new Date(record.timestamp).toLocaleDateString() : 'Unknown date'}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            ${runtimeLabel}
                        </div>
                    `;
                    cell.onclick = (e) => {
                        e.stopPropagation();
                        resumePlaybackFromRecord(record);
                    };
                    historyContainer.appendChild(cell);
                });
            } else {
                panel.classList.add('hidden');
                historyContainer.innerHTML = '';
            }
        }

        function recordWatchHistory() {
            if (!storageAvailable) return;
            
            let localHistory = [];
            try {
                const raw = localStorage.getItem('hylton_local_history');
                localHistory = raw ? JSON.parse(raw) : [];
            } catch (e) {
                console.warn('Failed to parse history:', e);
            }
            
            localHistory = localHistory.filter(item => item.id !== activeId.toString());

            const historyItem = {
                id: activeId.toString(),
                type: activeType,
                title: activeTitle,
                season: activeSeason,
                episode: activeEpisode,
                timestamp: Date.now()
            };

            localHistory.push(historyItem);
            if (localHistory.length > 50) localHistory = localHistory.slice(-50);
            
            try {
                localStorage.setItem('hylton_local_history', JSON.stringify(localHistory));
            } catch (e) {
                console.warn('Failed to save history:', e);
            }
        }

        function retrieveSavedProgressMarker() {
            if (!storageAvailable) return;
            
            try {
                const raw = localStorage.getItem('hylton_local_history');
                const localHistory = raw ? JSON.parse(raw) : [];
                const matchingRecord = localHistory.find(item => item.id === activeId.toString() && item.type === 'tv');
                
                if(matchingRecord) {
                    activeSeason = parseInt(matchingRecord.season) || 1;
                    activeEpisode = parseInt(matchingRecord.episode) || 1;
                }
            } catch (e) {
                console.warn('Failed to retrieve progress:', e);
            }
        }

        function resumePlaybackFromRecord(record) {
            launchPlayer(record.type, record.id, record.title);
            if(record.type === 'tv') {
                activeSeason = parseInt(record.season);
                activeEpisode = parseInt(record.episode);
                const selector = document.getElementById('season-select');
                if(selector) selector.value = activeSeason;
                buildEpisodeGrid(record.id, activeSeason);
            }
        }

        function clearDeviceHistory() {
            if(confirm("Clear your watch history from this device?")) {
                removeItem('hylton_local_history');
                syncDashboardUI();
            }
        }
    </script>
